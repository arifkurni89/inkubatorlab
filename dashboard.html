<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Incubator Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}
body{

    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

}

.container{

    width:900px;
    max-width:95%;

}

.title{

    color:white;

    text-align:center;

    margin-bottom:25px;

}

.title h1{

    font-size:34px;

}

.title p{

    margin-top:5px;

    opacity:.8;

}

/* ========================= */
/* BARU */
/* ========================= */

.row{

    display:flex;

    gap:20px;

    margin-bottom:20px;

}

.row .card{

    flex:1;

    margin-bottom:0;

}

/* ========================= */

.card{

    background:rgba(255,255,255,.12);

    border-radius:18px;

    backdrop-filter:blur(12px);

    padding:22px;

    color:white;

    text-align:center;

    border:1px solid rgba(255,255,255,.15);

    box-shadow:0 8px 20px rgba(0,0,0,.25);

    margin-bottom:20px;

}

.label{

    font-size:18px;

    margin-bottom:12px;

}

.value{

    font-size:42px;

    font-weight:bold;

}

.status{

    font-size:42px;

    font-weight:bold;

    color:#00ff99;

}

.button{

    width:100%;

    margin-top:15px;

    padding:15px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    font-size:18px;

    background:#00bcd4;

    color:white;

}

.button:hover{

    background:#0097a7;

}
.chart-card{

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(12px);

    border-radius:18px;

    padding:25px;

    margin-bottom:20px;

    border:1px solid rgba(255,255,255,.15);

}
.chart-title{

    color:white;

    font-size:28px;

    font-weight:bold;

    text-align:center;

    margin-bottom:20px;

}

canvas{

    width:100% !important;

    height:380px !important;

    background:white;

    border-radius:12px;

}

.chart-title{

    color:white;

    font-size:22px;

    font-weight:bold;

    text-align:center;

    margin-bottom:15px;

}

.footer{

    color:white;

    margin-top:18px;

    text-align:center;

    opacity:.7;

}

/* RESPONSIVE */

@media(max-width:700px){

.row{

flex-direction:column;

}

.container{

width:100%;

}

}

</style>

</head>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<body>

<div class="container">

<div class="title">

<h1>🧪 INKUBATOR BAKTERI</h1>

<p>01202205044</p>

</div>

<!-- BARIS 1 -->

<div class="row">

<div class="card">

<div class="label">

🌡 Suhu

</div>

<div class="value" id="suhu">

0 °C

</div>

</div>

<div class="card">

<div class="label">

🔥 Heater Power

</div>

<div class="value" id="heater">

0 %

</div>

</div>

</div>

<!-- BARIS 2 -->

<div class="row">

<div class="card">

<div class="label">

💧 Kelembapan

</div>

<div class="value" id="kelembapan">

0 %

</div>

</div>

<div class="card">

<div class="label">

🌀 Fan Power

</div>

<div class="value" id="fan">

0 %

</div>

</div>

</div>

<!-- STATUS -->

<div class="card">

<div class="label">

⚙ Status

</div>

<div class="status" id="status">

RUN

</div>

</div>

<!-- TIMER PALING BAWAH -->

<div class="card">

<div class="label">

⏳ Countdown Timer

</div>

<div class="value" id="timer">

00:00:00

</div>

</div>

<!-- ================= GRAFIK ================= -->

<div class="chart-card">

    <div class="chart-title">
        📈 Grafik Suhu & Kelembapan
    </div>

    <canvas id="chartRealtime"></canvas>

</div>

<!-- ================= BUTTON ================= -->

<button class="button" onclick="downloadSuhu()">
📥 Download Suhu vs Waktu.xlsx
</button>

<button class="button" onclick="downloadHum()">
📥 Download Kelembapan vs Waktu.xlsx
</button>

<div class="footer">

Realtime Monitoring System

</div>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyATTlZdhuljeMGAwWqLLDgNz_NDIosH7ZI",

authDomain: "inkubatorlab-67763.firebaseapp.com",

databaseURL: "https://inkubatorlab-67763-default-rtdb.asia-southeast1.firebasedatabase.app/",

projectId: "inkubatorlab-67763",

storageBucket: "inkubatorlab-67763.firebasestorage.app",

messagingSenderId: "720919496287",

appId: "1:720919496287:web:655cb7fec63bb1047f7dea"

};

firebase.initializeApp(firebaseConfig);

const database = firebase.database();

const live = database.ref("inkubator/inkubatorlab/live");

const history = database.ref("inkubator/inkubatorlab/history");

const labels=[];

const suhuData=[];

const humData=[];

live.on("value",(snapshot)=>{

const data=snapshot.val();

if(!data) return;

document.getElementById("suhu").innerHTML=data.temperature_c.toFixed(1)+" °C";

document.getElementById("kelembapan").innerHTML=data.humidity_percent.toFixed(1)+" %";

document.getElementById("heater").innerHTML=data.heater_power_percent+" %";

document.getElementById("fan").innerHTML=data.fan_power_percent+" %";

document.getElementById("timer").innerHTML=data.incubation_remaining_text;

document.getElementById("status").innerHTML=data.status;

labels.push(data.incubation_remaining_text);

suhuData.push(data.temperature_c);

humData.push(data.humidity_percent);

if(labels.length>30){

labels.shift();

suhuData.shift();

humData.shift();

}

chart.update();
});
const ctx=document.getElementById("chartRealtime");

const chart=new Chart(ctx,{

type:"line",

data:{

labels:labels,

datasets:[

{

label:"Suhu",

data:suhuData,

borderColor:"red",

backgroundColor:"transparent",

borderWidth:3,

tension:0.3

},

{

label:"Kelembapan",

data:humData,

borderColor:"blue",

backgroundColor:"transparent",

borderWidth:3,

tension:0.3

}

]

},

options:{

responsive:true,

maintainAspectRatio:false,

animation:false,

plugins:{

legend:{

position:'top',

labels:{

color:'black',

font:{

size:16

}

}

}

},

scales:{

x:{

title:{

display:true,

text:'Waktu',

color:'black'

},

ticks:{

color:'black'

}

},

y:{

title:{

display:true,

text:'Nilai',

color:'black'

},

ticks:{

color:'black'

}

}

}

}

});

function downloadSuhu(){

history.once("value",(snapshot)=>{

const data=snapshot.val();

if(!data){

alert("Belum ada data");
return;

}

let excelData=[];

excelData.push(["Waktu (detik)","Suhu (°C)"]);

Object.keys(data).forEach(key=>{

excelData.push([
data[key].waktu_detik,
data[key].temperature_c
]);

});

const wb = XLSX.utils.book_new();

const ws = XLSX.utils.aoa_to_sheet(excelData);

ws["!cols"] = [
    { wch: 20 },
    { wch: 18 }
];

XLSX.utils.book_append_sheet(wb,ws,"Data Suhu");

XLSX.writeFile(wb,"Suhu_vs_Waktu.xlsx");

});

}

function downloadHum(){

history.once("value",(snapshot)=>{

const data=snapshot.val();

if(!data){

alert("Belum ada data");
return;

}

let excelData=[];

excelData.push(["Waktu (detik)","Kelembapan (%)"]);

Object.keys(data).forEach(key=>{

excelData.push([
data[key].waktu_detik,
data[key].humidity_percent
]);

});

const wb = XLSX.utils.book_new();

const ws = XLSX.utils.aoa_to_sheet(excelData);

ws["!cols"] = [
    { wch: 20 },
    { wch: 18 }
];

XLSX.utils.book_append_sheet(wb,ws,"Data RH");

XLSX.writeFile(wb,"Kelembapan_vs_Waktu.xlsx");

});

}
</script>
</body>

</html>
