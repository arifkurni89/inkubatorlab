<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login Inkubator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);

}

.login-box{

width:380px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(15px);

padding:40px;

border-radius:20px;

text-align:center;

box-shadow:0 10px 25px rgba(0,0,0,.3);

color:white;

}

h1{

margin-bottom:30px;

font-size:32px;

}

input{

width:100%;

padding:15px;

margin:12px 0;

border:none;

border-radius:10px;

font-size:17px;

}

button{

width:100%;

padding:15px;

margin-top:20px;

border:none;

border-radius:10px;

font-size:18px;

cursor:pointer;

background:#00BCD4;

color:white;

}

button:hover{

background:#0097A7;

}

#error{

margin-top:15px;

color:#ff8080;

}

</style>

</head>

<body>

<div class="login-box">

<h1>🧪 Inkubator Bakteri</h1>

<input type="text" id="username" placeholder="Nama">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">

LOGIN

</button>

<p id="error"></p>

</div>

<script>

function login(){

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

if(user=="Arifkurniawan" && pass=="01202205044")
{
window.location.href="dashboard.html";

}
else{

document.getElementById("error").innerHTML="Nama atau Password salah";

}

}

</script>

</body>

</html>
